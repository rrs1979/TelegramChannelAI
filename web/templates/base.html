<!DOCTYPE html>
<html lang="en" class="dark">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{% block title %}Dashboard{% endblock %} — ChannelAI</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
        tailwind.config = {
            darkMode: 'class',
            theme: {
                extend: {
                    colors: {
                        dark: { 800: '#1a1a2e', 900: '#0f0f1a', 700: '#252540' }
                    }
                }
            }
        }
    </script>
    <style>
        body { background: #0f0f1a; }
        .badge { @apply px-2 py-0.5 rounded text-xs font-medium; }
    </style>
</head>
<body class="text-gray-200 min-h-screen">
    <!-- nav -->
    <nav class="bg-dark-800 border-b border-gray-700/50">
        <div class="max-w-6xl mx-auto px-4 py-3 flex items-center gap-6">
            <a href="/" class="text-lg font-bold text-white">ChannelAI</a>
            <div class="flex gap-4 text-sm">
                <a href="/" class="hover:text-white {% if request.path == '/' %}text-white{% else %}text-gray-400{% endif %}">Dashboard</a>
                <a href="/sources" class="hover:text-white {% if request.path == '/sources' %}text-white{% else %}text-gray-400{% endif %}">Sources</a>
                <a href="/queue" class="hover:text-white {% if '/queue' in request.path %}text-white{% else %}text-gray-400{% endif %}">Queue</a>
            </div>
            <div class="ml-auto">
                <span id="status-dot" class="inline-block w-2 h-2 rounded-full bg-green-500"></span>
                <span class="text-xs text-gray-500 ml-1">online</span>
            </div>
        </div>
    </nav>

    <!-- content -->
    <main class="max-w-6xl mx-auto px-4 py-6">
        {% block content %}{% endblock %}
    </main>

    <script src="{{ url_for('static', filename='app.js') }}"></script>
    {% block scripts %}{% endblock %}
</body>
</html>
