<!DOCTYPE html>
<html lang="en" class="dark">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{% block title %}Dashboard{% endblock %} — ChannelAI</title>
    <link rel="icon" type="image/svg+xml" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>📡</text></svg>">
    <meta name="theme-color" content="#0f0f1a">
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
        tailwind.config = {
            darkMode: 'class',
            theme: {
                extend: {
                    colors: {
                        dark: { 800: '#1a1a2e', 900: '#0f0f1a', 700: '#252540' }
                    }
                }
            }
        }
    </script>
    <style>
        body { background: #0f0f1a; }
        .card {
            @apply bg-dark-800 rounded-lg p-4 border border-gray-700/30;
            transition: border-color .2s ease, transform .2s ease;
        }
        /* only lift on devices with a real pointer — on a phone the :hover
           sticks after you tap a card and leaves it raised till you tap away */
        @media (hover: hover) {
            .card:hover {
                border-color: rgba(156,163,175,.25);
                transform: translateY(-1px);
            }
        }
        @keyframes pulse-dot {
            0%, 100% { opacity: 1; box-shadow: 0 0 0 0 rgba(34,197,94,.4); }
            50% { opacity: .85; box-shadow: 0 0 0 4px rgba(34,197,94,0); }
        }
        .muted { @apply text-xs text-gray-500; }
        .hint { @apply text-xs text-gray-500 mt-1; }
        /* the little caps label above each big number in the stat cards on
           /dashboard — same four classes were copied onto all four of them */
        .stat-label { @apply text-gray-400 text-xs uppercase tracking-wide; }
        /* tiny inline 'copy' buttons next to ids/usernames/msg_ids — same
           text-gray-600 hover:text-gray-300 text-xs transition was inlined
           on every one of them across templates */
        .copy-btn { @apply text-xs text-gray-600 hover:text-gray-300 transition; }
        /* bigger 'Copy' buttons pinned to the top-right of the text bodies
           on /queue (original + rewritten previews) and /published — same
           long string everywhere, only bg differed (dark-800 over the inner
           dark-900 box on queue, dark-700 over the dark-800 card on published)
           so the bg stays inline */
        .copy-overlay { @apply absolute top-2 right-2 text-xs text-gray-500 hover:text-gray-200 px-2 py-0.5 rounded transition; }
        /* the copy buttons just snapped to 'Copied!' with nothing to confirm the
           click registered — a quick scale pop reads as feedback without a color */
        @keyframes copy-pop { 0% { transform: scale(1); } 35% { transform: scale(1.14); } 100% { transform: scale(1); } }
        .copied { display: inline-block; animation: copy-pop .3s ease-out; }
        /* solid action buttons eased their bg on hover but a click had no give —
           a 1px push down reads as a real press. the text-only copy buttons get
           their own copy-pop on the label, so leave those out. transform already
           transitions via tailwind's `transition` class that's on every button */
        button:not(.copy-btn):not(.copy-overlay):active { transform: translateY(1px); }
        /* keep numeric columns aligned when row digits vary in width */
        .tabular { font-variant-numeric: tabular-nums; }
        /* long URLs / unbroken hashes in queue and published bodies stretched
           past the card on phones — whitespace-pre-wrap only breaks at spaces */
        .post-text { overflow-wrap: anywhere; }
        .status-pulse { animation: pulse-dot 2s ease-in-out infinite; }
        @keyframes spin { to { transform: rotate(360deg); } }
        .spinner {
            display: inline-block;
            width: .85em; height: .85em;
            border: 2px solid rgba(255,255,255,.3);
            border-top-color: #fff;
            border-radius: 50%;
            animation: spin .6s linear infinite;
            vertical-align: middle;
            margin-right: .35em;
        }
        details[open] > :not(summary) {
            animation: details-open .25s ease-out;
        }
        @keyframes details-open {
            from { opacity: 0; transform: translateY(-4px); }
            to   { opacity: 1; transform: translateY(0); }
        }
        /* queue cards fade out when approved/rejected instead of just popping away */
        .leaving {
            opacity: 0;
            transform: translateX(-12px);
            transition: opacity .25s ease, transform .25s ease;
            pointer-events: none;
        }
        .skip-link {
            position: absolute;
            left: -9999px;
            top: 0;
            z-index: 50;
            padding: .5rem 1rem;
            background: #252540;
            color: #fff;
            font-size: .875rem;
            border-radius: 0 0 .375rem 0;
        }
        .skip-link:focus { left: 0; }

        /* tells the browser to render native controls (number spinners, dropdowns,
           scrollbar corner) in dark mode — without it the /settings number input
           shows white spinner buttons against the dark card */
        html { color-scheme: dark; }

        /* default text-selection blue clashes with the purple palette */
        ::selection { background: #3a3a5e; color: #fff; }

        /* search and form fields snapped from gray to blue instantly on focus,
           looked jumpy next to the .15s transitions everywhere else */
        input, select, textarea { transition: border-color .15s ease; }

        /* dark scrollbar so it doesn't flash white; tinted to match the purple-ish palette */
        ::-webkit-scrollbar { width: 8px; height: 8px; }
        ::-webkit-scrollbar-track { background: #0f0f1a; }
        ::-webkit-scrollbar-thumb {
            background: #2a2a45; border-radius: 4px;
            transition: background-color .15s ease;
        }
        ::-webkit-scrollbar-thumb:hover { background: #3a3a5e; }
        @supports (scrollbar-color: auto) {
            * { scrollbar-color: #2a2a45 #0f0f1a; scrollbar-width: thin; }
        }

        /* nav gets cramped on phones — let the links scroll sideways */
        @media (max-width: 640px) {
            nav > div { gap: .75rem; padding: .5rem .75rem; }
            .nav-links {
                overflow-x: auto;
                flex-wrap: nowrap;
                scrollbar-width: none;
                -webkit-overflow-scrolling: touch;
            }
            .nav-links::-webkit-scrollbar { display: none; }
            main { padding-left: .75rem; padding-right: .75rem; }
            /* "Last run 5m ago" eats nav width on phones and squeezes the
               links into a tight horizontal scroll — drop it, dot stays */
            #nav-last-run { display: none; }
            /* page-header on /queue, /published, /sources puts the search
               input + select(s) + count + auto-refresh + status pills all
               in one no-wrap flex row — the OUTER header wraps fine (title
               vs controls) but this inner row pushed past the right edge
               on phones; :has() flips it from here so I don't have to
               touch all three templates */
            div:has(> #queue-search),
            div:has(> #published-search),
            div:has(> #sources-search) { flex-wrap: wrap; }
            /* iOS Safari zooms the whole page in when you focus an input
               whose font is under 16px — every search/settings field is
               text-sm (14px), so tapping one yanks the viewport. 16px on
               phones stops the jump; desktop keeps text-sm (this is inside
               the 640px query) */
            input, select, textarea { font-size: 16px; }
            /* the inline copy buttons are bare text-xs glyphs with no padding —
               easy to hit with a mouse but a fiddly tap target on a phone.
               pad out the hit area and pull it back with negative margin so the
               layout around them doesn't shift */
            .copy-btn { padding: .35rem .45rem; margin: -.35rem -.45rem; }
            /* the runs/published tables sit in an overflow-x-auto box and scroll
               sideways on phones — give them the same momentum scroll the nav got
               so a flick doesn't stop dead halfway across the row */
            .overflow-x-auto { -webkit-overflow-scrolling: touch; }
        }
    </style>
</head>
<body class="text-gray-200 min-h-screen">
    <a href="#main-content" class="skip-link">Skip to content</a>

    <!-- nav -->
    <nav class="bg-dark-800 border-b border-gray-700/50" aria-label="Main navigation">
        <div class="max-w-6xl mx-auto px-4 py-3 flex items-center gap-6">
            <a href="/" class="text-lg font-bold text-white">ChannelAI</a>
            <div class="nav-links flex gap-4 text-sm">
                <a href="/" class="transition-colors duration-150 hover:text-white {% if request.path == '/' %}text-white{% else %}text-gray-400{% endif %}" {% if request.path == '/' %}aria-current="page"{% endif %}>Dashboard</a>
                <a href="/sources" class="transition-colors duration-150 hover:text-white {% if request.path == '/sources' %}text-white{% else %}text-gray-400{% endif %}" {% if request.path == '/sources' %}aria-current="page"{% endif %}>Sources</a>
                <a href="/queue" class="transition-colors duration-150 hover:text-white {% if '/queue' in request.path %}text-white{% else %}text-gray-400{% endif %}" {% if '/queue' in request.path %}aria-current="page"{% endif %}>Queue</a>
                <a href="/published" class="transition-colors duration-150 hover:text-white {% if request.path == '/published' %}text-white{% else %}text-gray-400{% endif %}" {% if request.path == '/published' %}aria-current="page"{% endif %}>Published</a>
                <a href="/analytics" class="transition-colors duration-150 hover:text-white {% if request.path == '/analytics' %}text-white{% else %}text-gray-400{% endif %}" {% if request.path == '/analytics' %}aria-current="page"{% endif %}>Analytics</a>
                <a href="/settings" class="transition-colors duration-150 hover:text-white {% if request.path == '/settings' %}text-white{% else %}text-gray-400{% endif %}" {% if request.path == '/settings' %}aria-current="page"{% endif %}>Settings</a>
            </div>
            <div class="ml-auto flex items-center gap-4">
                {% if global_last_run %}
                <span class="text-xs text-gray-500" id="nav-last-run" data-ts="{{ global_last_run.started_at }}"></span>
                {% endif %}
                <span class="flex items-center">
                    <span id="status-dot" class="inline-block w-2 h-2 rounded-full bg-green-500 status-pulse"></span>
                    <span class="text-xs text-gray-500 ml-1">online</span>
                </span>
            </div>
        </div>
    </nav>

    <!-- content -->
    <main id="main-content" class="max-w-6xl mx-auto px-4 py-6">
        {% block content %}{% endblock %}
    </main>

    <script src="{{ url_for('static', filename='app.js') }}"></script>
    {% block scripts %}{% endblock %}
</body>
</html>
